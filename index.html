<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>导航站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Personal Portal</p>
          <h1>导航站</h1>
        </div>
      </header>

      <section class="search-panel" aria-label="搜索">
        <form id="searchForm" class="search-form">
          <input
            id="searchInput"
            type="search"
            placeholder="搜索网站，或直接输入网址"
            autocomplete="off"
          />
          <button type="submit">打开</button>
        </form>
      </section>

      <section class="section-head">
        <div>
          <p class="eyebrow">Quick Links</p>
          <h2>常用链接</h2>
        </div>
        <button id="addLinkButton" class="admin-only" type="button">添加链接</button>
      </section>

      <section id="linkGrid" class="link-grid" aria-live="polite"></section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="close-button" id="closeModal" type="button" aria-label="关闭">×</button>

        <form id="loginForm" class="modal-view">
          <h2 id="modalTitle">管理登录</h2>
          <p>登录后可添加或删除导航链接。</p>
          <label>
            管理密码
            <input id="passwordInput" type="password" autocomplete="current-password" />
          </label>
          <button type="submit">登录</button>
          <small id="loginHint">默认密码：admin123</small>
        </form>

        <form id="linkForm" class="modal-view" hidden>
          <h2>添加链接</h2>
          <label>
            名称
            <input id="linkName" type="text" placeholder="例如：Google" maxlength="24" />
          </label>
          <label>
            网址
            <input id="linkUrl" type="url" placeholder="https://example.com" />
          </label>
          <label>
            分类
            <input id="linkCategory" type="text" placeholder="工具 / 学习 / 工作" maxlength="18" />
          </label>
          <button type="submit">保存链接</button>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
